<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mica ❤️</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/popup.css">
    <link rel="stylesheet" href="css/indexResponsive.css">
</head>

<body>
    <div class="container">

        <!-- Seccion de Introduccion -->

        <section id="cards">
            <div id="notes">
                <p>✉️ CARTA</p>
                <p>Para: La princesa mas hermosa ♡</p>
                <p>De: Daniel ♡</p>
            </div>

            <div id="main-section">
                <p>01 - Empezamos aqui!</p>
            </div>
        </section>
        <div class="main-container">
            <section id="left-size">
                <img id="lirios-image"
                    src="assets/icons/ramo-flores-lirio-jardin-verano-aislado-sobre-fondo-blanco_1322553-42055-removebg-preview.png"
                    alt="lirios">
                <img id="vela-image" src="assets/icons/pink-candle-flat-by-Vexels.png" alt="Vela">
                <img id="melody-image" src="assets/icons/melody.png" alt="Melody">
                <img id="carta-image" src="assets/icons/icons8-carta-de-amor-100.png" alt="Carta de Amor">
            </section>
            <section id="center-size">
                <div id="first-section-notes" onclick="abrirNotas()">
                    <p>🗒️ Read Me ♡</p>
                </div>
                <div id="notes-popup" class="popup">
                    <div class="popup-content">
                        <span class="close" onclick="cerrarNotas()">✖</span>

                        <iframe src="/pages/sunflower.html" class="popup-frame"></iframe>

                    </div>
                </div>
                <img id="main-image" src="assets/img/main.png" alt="Main Image">
                <iframe id="spotify-iframe" data-testid="embed-iframe" style="border-radius:12px"
                    src="https://open.spotify.com/embed/track/6HRcmVlNreVPEkkQfmcWbf?utm_source=generator" width="80%"
                    height="152" frameBorder="0" allowfullscreen=""
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy"></iframe>
                <img src="/assets/img/spotifyCode.png" alt="spotify-code" id="spotify-code" style="display: none;">
            </section>
            <section id="right-size">
                <img src="assets/icons/imagen_2026-03-08_204039656-removebg-preview.png" alt="balage" id="balage-image">
                <img src="assets/icons/hello-kitty-png-icon-16795.png" alt="hello-kitty" id="hello-kitty-image">
                <img src="assets/icons/psicologia.png" alt="psicologia" id="psicologia-image">
            </section>
        </div>

        <!-- Seccion de Imagenes -->

        <!-- <div class="messages-container">
            <p>💌 Mensajes</p>
        </div> -->

        <!-- Seccion de Imagenes -->

        <div class="images-container">
            <section id="left-size-images">
                <img id="chocolate-cake-image" src="assets/icons/chocolate-cake.png" alt="chocolate cake">
                <img id="maki-image" src="assets/icons/maki.png" alt="Maki">
                <img id="carta-image" src="assets/icons/icons8-carta-de-amor-100.png" alt="Carta de Amor">
            </section>
            <section id="center-size-images">
                <div id="second-section-notes">
                    <p>🗒️ Momentos favoritos a tu lado ♡</p>
                </div>
                <div class="momentos-images">
                    <div class="img-container-moment">
                        <img>
                        <p></p>
                    </div>
                    <div class="img-container-moment">
                        <img>
                        <p></p>
                    </div>
                    <div class="img-container-moment">
                        <img>
                        <p></p>
                    </div>
            </section>
            <section id="right-size-images">
                <img id="chocolate-cake-image" src="assets/icons/chocolate-cake.png" alt="chocolate cake">
                <img id="maki-image" src="assets/icons/maki.png" alt="Maki">
                <img src="assets/icons/psicologia.png" alt="psicologia" id="psicologia-image">
            </section>
        </div>

    </div>
</body>
<script src="js/index.js"></script>

</html>
